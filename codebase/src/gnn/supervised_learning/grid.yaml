# grid.yaml — default hyperparameter sweep (ExpressionGNN)
#
# Used by run_all.py when no --stage is given. For fixed per-stage grids,
# use the stage-specific grid.yaml under config_settings/<stage>/.
#
# Each key is a dotted path into config_supervised.yaml.
# configs_gen.py takes the Cartesian product of all value lists.

gnn.layer_type:
  - ginconv

gnn.layers_mp:
  - 2
  - 3

gnn.dim_inner:
  - 128
  - 256

gnn.dropout:
  - 0.0
  - 0.2

model.graph_pooling:
  - mean
  - add
