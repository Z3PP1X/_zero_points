# grid.yaml
#
# Pooling / skip-connection ablation over the shared TestGraphNetwork backbone
# (requires model.type: expression_classifier in config_supervised.yaml).
#
#   variant:   legacy        -> real/virtual split pooling (baseline, ignores pool_type)
#              pooling       -> hierarchical pooling between blocks (last-block readout)
#              pooling_skip  -> hierarchical pooling + JK-style skip aggregation of readouts
#   pool_type: topk          -> TopKPooling (readout = mean || max)
#              diffpool      -> DenseSAGE soft clustering (clusters 16,4) + link+entropy aux loss
#
# NOTE: gnn.variant and gnn.pool_type are deliberately NOT swept here. The grid is a
# blind Cartesian product (configs_gen.py), and `legacy` ignores pool_type, so sweeping
# variant x pool_type emits a behaviourally identical `legacy x diffpool` duplicate that
# wastes a full training run. Instead, pick one arm per run by setting gnn.variant /
# gnn.pool_type directly in config_supervised.yaml, e.g.:
#   - legacy            (pool_type ignored)
#   - pooling      + topk | diffpool
#   - pooling_skip + topk | diffpool
# -> 5 distinct arms, zero duplicates.
#
# layer_type is the only swept axis (edge-aware stacks only for expression_classifier).
# Add gineconv below to cross the chosen pooling arm with layer type.
gnn.layer_type:
  - gatv2conv
