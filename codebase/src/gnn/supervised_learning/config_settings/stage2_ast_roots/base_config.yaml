# =====================================================================================
# STUFE 2 — AST + Root-Identität (23 Features: node_type + root_color + label)
# =====================================================================================
# Erweiterung um root_color: die Wurzelknoten von f, f' und f'' erhalten eine
# eindeutige Identitätskodierung. Damit kann das Modell ableiten, welcher Teilbaum
# zur Funktion, zur ersten oder zur zweiten Ableitung gehört.
#
# FIX:
#   model.type=expression_classifier, gnn.layer_type=gatv2conv,
#   active_features = node_type_* (4) + root_color_* (5) + label_* (14) = 23 Features
#
# EINSTELLBAR (siehe grid.yaml):
#   gnn.dim_inner, gnn.layers_mp, gnn.dropout
# =====================================================================================

out_dir: results
seed: 42001

dataset:
  format: custom_expression_graphs
  name: run_20260604_154509/dataset_joined
  task: graph
  task_type: classification
  transductive: False
  node_encoder: True
  node_encoder_name: ExpressionNodeEncoder
  node_encoder_bn: True

expression_graph:
  mode: graph
  edge_direction: top_down
  synthetic: True
  synthetic_dataset: run_20260604_154509/dataset_joined
  active_features: "node_type_global,node_type_operator,node_type_root,node_type_supernode,root_color_none,root_color_f,root_color_d1,root_color_d2,root_color_kappa,label_UNK,label_CONSTANT,label_x,label_E,label_Log,label_Pi,label_Sin,label_Cos,label_Tan,label_Plus,label_Minus,label_Times,label_Divide,label_Power"

train:
  mode: custom
  batch_size: 256
  num_workers: 0
  eval_period: 10
  ckpt_period: 20
  epoch_warmup: 5
  epochs: 60
  restart_period: 20
  curated_eval_period: 5
  curated_eval_on_test_highscore: true
  early_stopping: true
  early_stopping_monitor: val_pr_auc
  early_stopping_patience: 20
  early_stopping_min_delta: 0.0

model:
  type: expression_classifier
  loss_fun: weighted_cross_entropy
  edge_decoding: dot
  graph_pooling: mean

gnn:
  layers_mp: 3
  dim_inner: 128
  layer_type: gatv2conv
  act: prelu
  dropout: 0.2
  att_heads: 4

optim:
  optimizer: adamw
  base_lr: 0.0001
  weight_decay: 0.0005
  scheduler: cosine_with_restarts
