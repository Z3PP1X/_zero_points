# =====================================================================================
# STUFE 4 — Edge-Networks (gatv2conv | gineconv)
# =====================================================================================
# Vierte Stufe: edge-aware Message Passing. Die Kantenfeatures (child_index, direction,
# relation_type) werden nun direkt von den Conv-Layern konsumiert. Dafür wird der
# Backbone auf das custom 'expression_classifier' (TestGraphNetwork) umgestellt; es sind
# NUR noch die edge-aware Layer gatv2conv und gineconv erlaubt.
#
# FIX:
#   model.type=expression_classifier, mode=graph, edge_direction=top_down,
#   heterogeneous=false, add_kappa=false, add_virtual_supernode=false,
#   features = node + topology + edge (positional aus), gnn.variant=legacy, att_heads=4
#
# EINSTELLBAR (siehe grid.yaml):
#   gnn.layer_type {gatv2conv, gineconv}   <-- NEU (Edge-Networks)
#   gnn.dim_inner
#
# HINWEIS: layers_mp und dropout sind im homogenen TestGraphNetwork derzeit INERT
# (3 MP-Layer sind hardcodiert, dropout ist nicht verdrahtet) und werden daher hier
# gepinnt, nicht gesweept.
# =====================================================================================

out_dir: results
seed: 42001

dataset:
  format: custom_expression_graphs
  name: run_20260603_123013/parallel_benchmark_results
  task: graph
  task_type: classification
  transductive: False
  node_encoder: True
  node_encoder_name: ExpressionNodeEncoder
  node_encoder_bn: True

expression_graph:
  mode: graph                      # FIX
  edge_direction: top_down         # FIX
  heterogeneous: false             # FIX
  add_kappa: false                 # FIX
  add_virtual_supernode: false     # FIX
  synthetic: True
  synthetic_dataset: run_20260604_154509/parallel_benchmark_results
  features:
    node: true                     # FIX
    topology: true                 # FIX
    positional: false              # FIX
    edge: true                     # FIX: Edge-Features werden ab Stufe 4 genutzt
  active_features: ""

train:
  mode: custom
  batch_size: 256
  num_workers: 0
  eval_period: 10
  ckpt_period: 20
  epoch_warmup: 5
  epochs: 40
  restart_period: 20              # Periode für cosine_with_restarts (bei epochs=25 ein Warm-Restart)
  curated_eval_period: 5
  curated_eval_on_test_highscore: true
  early_stopping: true
  early_stopping_monitor: val_pr_auc
  early_stopping_patience: 15
  early_stopping_min_delta: 0.0

model:
  type: expression_classifier      # FIX: edge-aware custom Backbone (TestGraphNetwork)
  loss_fun: weighted_cross_entropy
  edge_decoding: dot
  graph_pooling: add              # inert für expression_classifier

gnn:
  layers_pre_mp: 1
  layers_mp: 3                     # INERT (TestGraphNetwork hardcodet 3) -> gepinnt
  layers_post_mp: 2
  dim_inner: 128                   # EINSTELLBAR
  layer_type: gatv2conv           # EINSTELLBAR {gatv2conv, gineconv}   <-- NEU
  stage_type: skipsum
  act: gelu
  dropout: 0.2                     # INERT im custom Backbone -> gepinnt
  att_heads: 4                     # FIX (GATv2-Köpfe)
  variant: legacy                  # FIX (Hierarchical Pooling kommt in Stufe 5/6)
  pool_type: topk                  # inert für variant=legacy
  aux_loss_weight: 1.0             # inert für variant=legacy

optim:
  optimizer: adamw
  base_lr: 0.0001
  weight_decay: 0.0005
  scheduler: cosine_with_restarts
