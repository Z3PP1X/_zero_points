# grid.yaml — STUFE 4 (Edge-Networks)
# 2 x 2 = 4 Konfigurationen.
# Nur wirksame Achsen: layer_type (die neue Edge-Network-Wahl) und dim_inner.
# layers_mp/dropout sind im homogenen TestGraphNetwork inert -> nicht gesweept.

gnn.layer_type:        # NEU: edge-aware Backbones (nur diese beiden erlaubt)
 # - gatv2conv
  - gineconv

gnn.layers_mp:
  - 2
  - 4

gnn.dim_inner:
  - 64
 # - 256

gnn.dropout:
  - 0.0

expression_graph.add_kappa:                
  - false
  - true

expression_graph.features.positional: 
  - false
  - true

expression_graph.edge_direction:
  - top_down
  - bottom_up
  - bidirectional