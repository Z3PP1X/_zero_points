# =====================================================================================
# STUFE 1 — Reiner AST (18 Features: node_type + label)
# =====================================================================================
# Ausgangspunkt: nur der Funktionsbaum f als reine Baumstruktur. Keine Ableitungen,
# keine topologischen Features, keine Anchor-PE, kein Root-Coloring.
# ExpressionGNN mit ginconv, active_features auf node_type + label beschränkt.
#
# FIX:
#   model.type=expression_classifier, gnn.layer_type=ginconv,
#   active_features = node_type_* (3) + label_* (15) = 18 Features
#
# EINSTELLBAR (siehe grid.yaml):
#   gnn.dim_inner, gnn.layers_mp, gnn.dropout
# =====================================================================================

out_dir: results
seed: 42001

share:
  num_splits: 3

data:
  curated_csv:  datasets/run_20260603_123013/parallel_benchmark_results.csv
  synthetic_csv: datasets/run_20260604_154509/dataset2_joined.csv
  graphs_dir:   datasets/graphs

dataset:
  format: custom_expression_graphs
  name: expression_graph_data
  task: graph
  task_type: classification
  transductive: False
  node_encoder: True
  node_encoder_name: ExpressionNodeEncoder
  node_encoder_bn: True

expression_graph:
  mode: tree_derivatives
  edge_direction: top_down
  synthetic: True
  features:
    node: true       # node_type_* + root_color_* + label_*
    topology: false  # subtree_size, subtree_depth, hist_*
    positional: false  # anchor_trigonometric, anchor_exponential, anchor_variable
  active_features: "node_type_global,node_type_operator,node_type_function,label_UNK,label_CONSTANT,label_x,label_E,label_Log,label_Pi,label_Sin,label_Cos,label_Tan,label_Plus,label_Minus,label_Times,label_Divide,label_Power,label_Sqrt"

  # ---------------------------------------------------------------------------
  # OPTIONAL — Strukturerweiterungen (default: aus, jederzeit einschaltbar)
  # Ändern die Graphstruktur, nicht den Feature-Vektor dieser Stufe.
  #   add_virtual_supernode: vollvernetzter Hilfsknoten — verkürzt Message-Passing-Pfade
  #   add_kappa:             κ-Teilgraph einbetten — vergrößert den Graph erheblich
  # ---------------------------------------------------------------------------
  add_virtual_supernode: false
  add_kappa: false

  # ---------------------------------------------------------------------------
  # OPTIONAL — Problembasierte Skalar-Features (default: aus)
  # Numerische Problemwerte werden durch ein kleines MLP kodiert und NACH dem Message
  # Passing mit dem Graph-Embedding fusioniert (separation of concerns). Ändern NICHT
  # den Knoten-Feature-Vektor / das One-Hot. MLP-Breite via gnn.global_hidden_dim (Default 8).
  #   WICHTIG: erfordert die CSV-Spalten x0, y_target, fx, d1x, d2x.
  #   synthetic_dataset2.csv hat nur y_target → Einschalten im synthetic-Modus bricht mit
  #   klarem Fehler ab. Nutzbar mit dem Curated-Datensatz (synthetic: false) oder einem
  #   Synthetic-CSV, das diese Spalten enthält.
  # ---------------------------------------------------------------------------
  use_scalar_features: false
  scalar_features: "x0,y_target,fx,d1x,d2x"

train:
  mode: custom
  batch_size: 256
  num_workers: 0
  eval_period: 10
  ckpt_period: 20
  epoch_warmup: 5
  epochs: 60
  restart_period: 20
  curated_eval_period: 1
  curated_eval_on_test_highscore: true
  curated_eval_warmup: 5          # skip curated holdout eval for the first N epochs (OOD transient guard); 0 disables
  early_stopping: true
  early_stopping_monitor: val_pr_auc
  early_stopping_patience: 20
  early_stopping_min_delta: 0.002  # min change that counts as an improvement (rounding noise below this is ignored)

model:
  type: expression_classifier
  loss_fun: weighted_cross_entropy
  edge_decoding: dot
  graph_pooling: mean

gnn:
  layers_mp: 3
  dim_inner: 128
  layer_type: ginconv
  act: prelu
  dropout: 0.2

optim:
  optimizer: adamw
  base_lr: 0.0001
  weight_decay: 0.0005
  scheduler: cosine_with_restarts
