# =====================================================================================
# STUFE 5 — Heterogene Netzwerke
# =====================================================================================
# Fünfte Stufe: heterogene Graphrepräsentation (HeteroData mit Knotentypen
# global/operator/root) statt der homogenen Packung. Verarbeitet vom
# HeteroExpressionClassifier (typ-spezifisches Message Passing + Readout).
#
# FIX:
#   model.type=expression_classifier, heterogeneous=true, mode=graph,
#   edge_direction=top_down, add_kappa=false, add_virtual_supernode=false,
#   features = node + topology + positional + edge (volles Schema; hetero erfordert es)
#
# EINSTELLBAR (siehe grid.yaml):
#   gnn.dim_inner, gnn.layers_mp
#   (gnn.layer_type / att_heads sind im Hetero-Pfad INERT: der HeteroExpressionClassifier
#    nutzt ausschließlich SAGEConv -> daher gepinnt, nicht gesweept.)
#
# -------------------------------------------------------------------------------------
# TODO / GEPLANT (noch nicht im Code):
#   Hierarchical Pooling (topk/diffpool) für heterogene Netze. Der
#   HeteroExpressionClassifier macht aktuell flaches Message Passing und ignoriert
#   gnn.variant / gnn.pool_type. Sobald das implementiert ist, kann die Pooling-Achse
#   in grid.yaml aktiviert werden (siehe dort den auskommentierten Block).
# =====================================================================================

out_dir: results
seed: 42001

dataset:
  format: custom_expression_graphs
  name: run_20260603_123013/parallel_benchmark_results
  task: graph
  task_type: classification
  transductive: False
  node_encoder: True
  node_encoder_name: ExpressionNodeEncoder
  node_encoder_bn: True

expression_graph:
  mode: graph                      # FIX
  edge_direction: top_down         # FIX
  heterogeneous: true              # FIX: nur heterogene Netzwerke in dieser Stufe
  add_kappa: false                 # FIX
  add_virtual_supernode: false     # FIX
  synthetic: True
  synthetic_dataset: run_20260604_154509/parallel_benchmark_results
  features:
    node: true                     # FIX
    topology: true                 # FIX
    # Volles Node-Schema (node+topology+positional) -> active_features bleibt None,
    # d.h. KEIN Dataset-seitiges Slicing. Das ist im Hetero-Pfad zwingend: der
    # HeteroExpressionClassifier erwartet die per-Typ-Features in voller Schemabreite
    # (16 Spalten). Eine Feature-Teilmenge ist mit heterogeneous=true aktuell NICHT
    # unterstützt (preprocessing.py sliced data.x, das es auf HeteroData nicht gibt).
    positional: true               # FIX (volles Schema erforderlich für hetero)
    edge: true                     # FIX
  active_features: ""

train:
  mode: custom
  batch_size: 2048
  num_workers: 0
  eval_period: 10
  ckpt_period: 20
  epoch_warmup: 5
  epochs: 25
  restart_period: 20              # Periode für cosine_with_restarts (bei epochs=25 ein Warm-Restart)
  curated_eval_period: 5
  curated_eval_on_test_highscore: true
  early_stopping: false
  early_stopping_monitor: val_pr_auc
  early_stopping_patience: 10
  early_stopping_min_delta: 0.0

model:
  type: expression_classifier      # FIX
  loss_fun: weighted_cross_entropy
  edge_decoding: dot
  graph_pooling: mean

gnn:
  layers_pre_mp: 1
  layers_mp: 2                     # EINSTELLBAR (Hetero-Pfad liest layers_mp = num_layers)
  layers_post_mp: 2
  dim_inner: 128                   # EINSTELLBAR
  layer_type: gatv2conv           # INERT im Hetero-Pfad (SAGEConv) -> gepinnt
  stage_type: skipsum
  act: gelu
  dropout: 0.2                     # INERT im Hetero-Pfad (Head hardcodet Dropout) -> gepinnt
  att_heads: 4                     # INERT im Hetero-Pfad (SAGEConv hat keine Köpfe) -> gepinnt
  variant: legacy                  # FIX (Pooling für hetero noch nicht verdrahtet)
  pool_type: topk                  # inert (siehe TODO im Header)
  aux_loss_weight: 1.0             # inert

optim:
  optimizer: adamw
  base_lr: 0.0001
  weight_decay: 0.0005
  scheduler: cosine_with_restarts
