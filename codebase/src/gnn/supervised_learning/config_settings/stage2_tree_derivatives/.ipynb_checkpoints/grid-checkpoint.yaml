# grid.yaml — STUFE 2 (Tree-Derivatives + Edge-Direction)
# 2 x 2 x 2 x 3 = 24 Konfigurationen.

gnn.layer_type:
  - ginconv

gnn.dim_inner:
  - 64
  - 256

gnn.layers_mp:
  - 2
  - 4

expression_graph.edge_direction:     # NEU in Stufe 2
  - top_down
  - bottom_up
  - bidirectional

expression_graph.add_virtual_supernode:
  - true
  - false

gnn.dropout:
  - 0.0
