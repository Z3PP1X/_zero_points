# =====================================================================================
# STUFE 2 — Tree-Derivatives + Edge-Direction
# =====================================================================================
# Zweite Stufe: f, f' und f'' werden über den global-Knoten verbunden. NEU ist die
# konfigurierbare AST-Message-Passing-Richtung (edge_direction). Weiterhin edge-blind,
# Basisfeatures.
#
# FIX:
#   mode=tree_derivatives, model.type=gnn (edge-blind), heterogeneous=false,
#   add_kappa=false, add_virtual_supernode=false, features = nur 'node',
#   gnn.dropout=0.2 (in dieser Stufe gepinnt, damit der Fokus auf edge_direction liegt)
#
# EINSTELLBAR (siehe grid.yaml):
#   gnn.layer_type {gcnconv, ginconv}, gnn.dim_inner, gnn.layers_mp,
#   expression_graph.edge_direction {top_down, bottom_up, bidirectional}   <-- NEU
# =====================================================================================

out_dir: results
seed: 42001

dataset:
  format: custom_expression_graphs
  name: run_20260603_123013/parallel_benchmark_results
  task: graph
  task_type: classification
  transductive: False
  node_encoder: True
  node_encoder_name: ExpressionNodeEncoder
  node_encoder_bn: True

expression_graph:
  mode: tree_derivatives           # FIX: f, f', f''
  edge_direction: top_down         # EINSTELLBAR (siehe grid.yaml)  <-- NEU in Stufe 2
  heterogeneous: false             # FIX
  add_kappa: false                 # FIX
  add_virtual_supernode: false     # FIX
  synthetic: True
  synthetic_dataset: run_20260604_154509/parallel_benchmark_results
  features:
    node: true                     # FIX: Basisfeatures
    topology: false                # FIX
    positional: false              # FIX
    edge: false                    # FIX
  active_features: ""

train:
  mode: custom
  batch_size: 2048
  num_workers: 0
  eval_period: 10
  ckpt_period: 20
  epoch_warmup: 5
  epochs: 25
  restart_period: 20              # Periode für cosine_with_restarts (bei epochs=25 ein Warm-Restart)
  curated_eval_period: 5
  curated_eval_on_test_highscore: true
  early_stopping: false
  early_stopping_monitor: val_pr_auc
  early_stopping_patience: 10
  early_stopping_min_delta: 0.0

model:
  type: gnn                        # FIX: edge-blind
  loss_fun: weighted_cross_entropy
  edge_decoding: dot
  graph_pooling: mean

gnn:
  layers_pre_mp: 1
  layers_mp: 2                     # EINSTELLBAR
  layers_post_mp: 2
  dim_inner: 128                   # EINSTELLBAR
  layer_type: ginconv             # EINSTELLBAR {gcnconv, ginconv}
  stage_type: skipsum
  act: gelu
  dropout: 0.2                     # FIX in Stufe 2 (gepinnt)

optim:
  optimizer: adamw
  base_lr: 0.0001
  weight_decay: 0.0005
  scheduler: cosine_with_restarts
