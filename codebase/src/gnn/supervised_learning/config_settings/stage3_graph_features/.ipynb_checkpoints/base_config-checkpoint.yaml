# =====================================================================================
# STUFE 3 — Graphen + Virtual Supernode + Kappa + erweiterte Features
# =====================================================================================
# Dritte Stufe: Übergang vom Baum zum Graphen (mode=graph mit augmentierten Kanten),
# plus mehrere zuschaltbare Struktur-/Feature-Erweiterungen. Weiterhin edge-blind
# (Edge-Networks kommen erst in Stufe 4).
#
# FIX:
#   mode=graph, model.type=gnn (edge-blind, gepinnt auf ginconv), edge_direction=top_down,
#   heterogeneous=false, dropout=0.2,
#   features.node=true, features.topology=true (erweiterte/topologische Baseline),
#   features.edge=false
#
# EINSTELLBAR (siehe grid.yaml):
#   gnn.dim_inner, gnn.layers_mp,
#   expression_graph.add_virtual_supernode {false,true},      <-- NEU
#   expression_graph.add_kappa {false,true},                  <-- NEU
#   expression_graph.features.positional {false,true}         <-- NEU (Anchor-PE an/aus)
#
# HINWEIS: add_virtual_supernode=true ist inkompatibel mit features.positional=true.
# Der Generator (configs_gen.py:_is_valid_config) überspringt solche Kombinationen
# automatisch -> aus 32 Grid-Punkten werden 24 gültige Konfigurationen.
# =====================================================================================

out_dir: results
seed: 42001

dataset:
  format: custom_expression_graphs
  name: run_20260603_123013/parallel_benchmark_results
  task: graph
  task_type: classification
  transductive: False
  node_encoder: True
  node_encoder_name: ExpressionNodeEncoder
  node_encoder_bn: True

expression_graph:
  mode: graph                      # FIX: Graph mit augmentierten Kanten
  edge_direction: top_down         # FIX in Stufe 3 (gepinnt)
  heterogeneous: false             # FIX
  add_kappa: false                 # EINSTELLBAR (siehe grid.yaml)        <-- NEU
  add_virtual_supernode: false     # EINSTELLBAR (siehe grid.yaml)        <-- NEU
  synthetic: True
  synthetic_dataset: run_20260604_154509/parallel_benchmark_results
  features:
    node: true                     # FIX
    topology: true                 # FIX: erweiterte/topologische Features (Baseline ab Stufe 3)
    positional: false              # EINSTELLBAR (siehe grid.yaml)        <-- NEU (Anchor-PE)
    edge: false                    # FIX (Edge-Features erst Stufe 4)
  active_features: ""

train:
  mode: custom
  batch_size: 256
  num_workers: 0
  eval_period: 10
  ckpt_period: 20
  epoch_warmup: 5
  epochs: 40
  restart_period: 20              # Periode für cosine_with_restarts (bei epochs=25 ein Warm-Restart)
  curated_eval_period: 5
  curated_eval_on_test_highscore: true
  early_stopping: true
  early_stopping_monitor: val_pr_auc
  early_stopping_patience: 15
  early_stopping_min_delta: 0.0

model:
  type: gnn                        # FIX: edge-blind
  loss_fun: weighted_cross_entropy
  edge_decoding: dot
  graph_pooling: add

gnn:
  layers_pre_mp: 1
  layers_mp: 2                     # EINSTELLBAR
  layers_post_mp: 2
  dim_inner: 128                   # EINSTELLBAR
  layer_type: ginconv             # FIX in Stufe 3 (gepinnt, edge-blind)
  stage_type: skipsum
  act: prelu
  dropout: 0.2                     # FIX in Stufe 3

optim:
  optimizer: adamw
  base_lr: 0.0001
  weight_decay: 0.0005
  scheduler: cosine_with_restarts
