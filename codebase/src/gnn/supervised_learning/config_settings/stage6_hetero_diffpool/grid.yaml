# grid.yaml — STUFE 6 (Hetero + Diffpool, GERÜST)
# Heute funktional identisch zu Stufe 5 (Hetero-Pooling/DiffPool ist noch nicht im Code).
# 2 x 2 = 4 Konfigurationen. layer_type/att_heads sind im Hetero-Pfad inert (SAGEConv)
# -> nicht gesweept, in der base_config gepinnt.

gnn.dim_inner:
  - 128
  - 256

gnn.layers_mp:
  - 2
  - 3

# -------------------------------------------------------------------------------------
