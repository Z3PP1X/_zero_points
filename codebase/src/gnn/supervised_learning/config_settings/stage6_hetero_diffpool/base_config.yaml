# =====================================================================================
# STUFE 6 — Hetero + Diffpool (GERÜST)
# =====================================================================================
# Sechste Stufe: hierarchical pooling — insbesondere DiffPool — auch für heterogene
# Netzwerke. Dies ist die geplante Weiterentwicklung von Stufe 5.
#
# WICHTIG: Diese Stufe ist aktuell ein CONFIG-GERÜST. Der HeteroExpressionClassifier
# unterstützt noch KEIN variant/pool_type (kein hierarchical pooling / DiffPool für
# hetero). Funktional ist diese Stufe daher heute identisch zu Stufe 5 (flaches
# Hetero-Message-Passing). Die DiffPool-Achse ist in grid.yaml als auskommentierter
# TODO vorbereitet und wird aktiviert, sobald der Hetero-DiffPool-Code existiert.
#
# FIX:
#   model.type=expression_classifier, heterogeneous=true, mode=graph,
#   edge_direction=top_down, features = node + topology + positional + edge (volles Schema)
#
# EINSTELLBAR (siehe grid.yaml):
#   gnn.dim_inner, gnn.layers_mp
#   (gnn.layer_type / att_heads sind im Hetero-Pfad INERT: GINConv -> gepinnt.)
#   (GEPLANT: gnn.variant {legacy, pooling}, gnn.pool_type {topk, diffpool})
# =====================================================================================

out_dir: results
seed: 42001

dataset:
  format: custom_expression_graphs
  name: run_20260603_123013/parallel_benchmark_results
  task: graph
  task_type: classification
  transductive: False
  node_encoder: True
  node_encoder_name: ExpressionNodeEncoder
  node_encoder_bn: True

expression_graph:
  mode: graph                      # FIX
  edge_direction: top_down         # FIX
  heterogeneous: true              # FIX
  add_kappa: false                 # FIX
  add_virtual_supernode: false     # FIX
  synthetic: True
  synthetic_dataset: run_20260604_154509/parallel_benchmark_results
  features:
    node: true                     # FIX
    topology: true                 # FIX
    # Volles Node-Schema (node+topology+positional) -> active_features bleibt None,
    # kein Dataset-Slicing. Im Hetero-Pfad zwingend (siehe Stufe 5): eine
    # Feature-Teilmenge ist mit heterogeneous=true aktuell nicht unterstützt.
    positional: true               # FIX (volles Schema erforderlich für hetero)
    edge: true                     # FIX
  active_features: ""

train:
  mode: custom
  batch_size: 256                 # == Stufe 5 (heute funktional identisch). HINWEIS: sobald
                                   # DiffPool-für-hetero im Code ist, hier ggf. auf 1024
                                   # reduzieren (DiffPool densifiziert Batches -> RAM).
  num_workers: 0
  eval_period: 10
  ckpt_period: 20
  epoch_warmup: 5
  epochs: 40
  restart_period: 20              # Periode für cosine_with_restarts (bei epochs=25 ein Warm-Restart)
  curated_eval_period: 5
  curated_eval_on_test_highscore: true
  early_stopping: true
  early_stopping_monitor: val_pr_auc
  early_stopping_patience: 15
  early_stopping_min_delta: 0.0

model:
  type: expression_classifier      # FIX
  loss_fun: weighted_cross_entropy
  edge_decoding: dot
  graph_pooling: add               # EINSTELLBAR: Readout (mean|add|max), jetzt im Hetero-Pfad verdrahtet

gnn:
  layers_pre_mp: 1
  layers_mp: 2                     # EINSTELLBAR (Hetero-Pfad liest layers_mp = num_layers)
  layers_post_mp: 2
  dim_inner: 128                   # EINSTELLBAR
  layer_type: gatv2conv           # INERT im Hetero-Pfad (GINConv) -> gepinnt
  stage_type: skipsum
  act: prelu                       # EINSTELLBAR: verdrahtet (Hetero-Convs + Head; war zuvor F.relu hardcodet)
  dropout: 0.2                     # EINSTELLBAR: verdrahtet (Hetero-Head) -> hier gepinnt
  att_heads: 4                     # INERT im Hetero-Pfad (GINConv hat keine Köpfe) -> gepinnt
  variant: legacy                  # GEPLANT: pooling (sobald hetero-pooling im Code ist)
  pool_type: diffpool              # GEPLANT-Marker; heute inert für hetero
  aux_loss_weight: 1.0             # DiffPool link+entropy aux-loss Gewicht (sobald aktiv)

optim:
  optimizer: adamw
  base_lr: 0.0001
  weight_decay: 0.0005
  scheduler: cosine_with_restarts
