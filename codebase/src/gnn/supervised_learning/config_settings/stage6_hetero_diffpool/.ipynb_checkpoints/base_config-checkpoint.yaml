# =====================================================================================
# STUFE 6 — Hetero + DiffPool
# =====================================================================================
# Sechste Stufe: hierarchisches Pooling (DiffPool) für heterogene Netzwerke.
# Weiterentwicklung von Stufe 5 (flaches Hetero-Message-Passing).
#
# FIX:
#   model.type=expression_classifier, heterogeneous=true, mode=graph,
#   edge_direction=top_down, features = node + topology + positional + edge (volles Schema)
#   variant=pooling, pool_type=diffpool  →  ein DiffPool-Schritt pro Knoten-Typ
#
# EINSTELLBAR (siehe grid.yaml):
#   gnn.dim_inner, gnn.layers_mp
#   gnn.variant {legacy, pooling}, gnn.pool_type {diffpool}
#   gnn.aux_loss_weight
#
# INERT (Hetero-Pfad):
#   gnn.layer_type / att_heads  →  GINConv gepinnt via to_hetero
# =====================================================================================

out_dir: results
seed: 42001

dataset:
  format: custom_expression_graphs
  name: run_20260603_123013/parallel_benchmark_results
  task: graph
  task_type: classification
  transductive: False
  node_encoder: True
  node_encoder_name: ExpressionNodeEncoder
  node_encoder_bn: True

expression_graph:
  mode: graph                      # FIX
  edge_direction: top_down         # FIX
  heterogeneous: true              # FIX
  add_kappa: false                 # FIX
  add_virtual_supernode: false     # FIX
  synthetic: True
  synthetic_dataset: run_20260604_154509/parallel_benchmark_results
  features:
    node: true                     # FIX
    topology: true                 # FIX
    # Volles Node-Schema (node+topology+positional) -> active_features bleibt None,
    # kein Dataset-Slicing. Im Hetero-Pfad zwingend: Feature-Teilmenge nicht unterstützt.
    positional: true               # FIX (volles Schema erforderlich für hetero)
    edge: true                     # FIX
  active_features: ""

train:
  mode: custom
  batch_size: 128                  # Reduziert wegen DiffPool-Densifizierung (RAM).
  num_workers: 0
  eval_period: 10
  ckpt_period: 20
  epoch_warmup: 5
  epochs: 40
  restart_period: 20              # Periode für cosine_with_restarts
  curated_eval_period: 5
  curated_eval_on_test_highscore: true
  early_stopping: true
  early_stopping_monitor: val_pr_auc
  early_stopping_patience: 15
  early_stopping_min_delta: 0.0

model:
  type: expression_classifier      # FIX
  loss_fun: weighted_cross_entropy
  edge_decoding: dot
  graph_pooling: add

gnn:
  layers_pre_mp: 1
  layers_mp: 2                     # EINSTELLBAR (Hetero-Pfad: num_layers)
  layers_post_mp: 2
  dim_inner: 128                   # EINSTELLBAR
  layer_type: gatv2conv            # INERT im Hetero-Pfad (GINConv via to_hetero)
  stage_type: skipsum
  act: prelu
  dropout: 0.2
  att_heads: 4                     # INERT im Hetero-Pfad (GINConv hat keine Köpfe)
  variant: pooling                 # pooling → ein DiffPool-Schritt pro Knoten-Typ
  pool_type: diffpool              # diffpool (einziger hierarchischer Pool-Typ für hetero)
  aux_loss_weight: 1.0             # DiffPool link+entropy aux-loss Gewicht

optim:
  optimizer: adamw
  base_lr: 0.0001
  weight_decay: 0.0005
  scheduler: cosine_with_restarts
