# config_supervised.yaml
# GraphGym configuration file for supervised GNN architecture evaluation

# Output directory for checkpoints, stats, and tensorboard logs
out_dir: results

# --- Dataset Section ---
# Demontrates Dependency Injection (DI) by passing properties that are read in loader_graphgym.py
dataset:
  format: custom_expression_graphs   # Registered loader name inside loader_graphgym.py
  name: run_20260603_123013/parallel_benchmark_results
  task: graph
  task_type: classification
  transductive: False
  # Embed categorical node_type/label_id codes instead of feeding them as raw
  # continuous values, and normalise the continuous columns. Implemented by
  # ExpressionNodeEncoder in loader_graphgym.py.
  node_encoder: True
  node_encoder_name: ExpressionNodeEncoder
  node_encoder_bn: True

expression_graph:
  mode: graph
  edge_direction: top_down  # top_down | bottom_up | bidirectional
  add_kappa: false  # merge kappa (h-function) subgraphs from datasets/kappas/ (CLI: --add-kappa)
  synthetic: True
  synthetic_dataset: run_20260604_154509/parallel_benchmark_results

  # Node/edge feature classes. Each category takes the same uniform form:
  #   true  -> load all members (default)   false -> load none   [a, b] -> only these
  # Classes: node | topology | positional | edge
  # CLI overrides: --feature-groups, --node-features, --topology-features,
  #                --positional-encoding, --edge-features
  features:
    node: true        # or e.g. [node_type, label_id, value, has_value, virtual_current_x_val, ...]
    topology: true    # or e.g. [depth, height, subtree_size, out_degree, betweenness_centrality]
    positional: [lpe, rwpe]  # lpe = Laplacian PE, rwpe = random-walk PE (true = both, false = none)
    edge: true        # child_index, direction, relation_type, edge_betweenness_centrality
                      # (edge: a subset is accepted but currently enables all edge columns)

  # Optional explicit override (disables grouped toggles above when non-empty)
  active_features: ""

# --- Training Loop Section ---
train:
  mode: custom
  batch_size: 2048
  num_workers: 0
  eval_period: 10
  ckpt_period: 20
  epoch_warmup: 5
  epochs: 25
  # Curated real-world holdout: not every epoch — periodic and/or on synthetic-test highscore
  curated_eval_period: 5          # run every Nth epoch (5, 10, 15, …); 0 disables periodic runs
  curated_eval_on_test_highscore: true  # also run when unseen synthetic val PR-AUC improves
  # Early stopping (opt-in). Validation runs every epoch, so patience is in epochs.
  early_stopping: false           # stop when the monitored metric stagnates/declines
  early_stopping_monitor: val_pr_auc  # val_pr_auc (max) | val_loss (min)
  early_stopping_patience: 10     # epochs without improvement before stopping
  early_stopping_min_delta: 0.0   # min change that counts as an improvement

# --- Model Structure ---
model:
  # expression_classifier routes through the shared TestGraphNetwork backbone, exposing the
  # gnn.variant (legacy/pooling/pooling_skip) and gnn.pool_type (topk/diffpool) axes below.
  # Set back to `gnn` to use PyG's stock GNN (graph_pooling/stage_type take effect then).
  type: expression_classifier
  loss_fun: weighted_cross_entropy
  edge_decoding: dot
  graph_pooling: mean              # inert for expression_classifier (it owns its pooling/readout)

# --- GNN Backbone Architecture (gatv2conv | gineconv | gcnconv | ginconv) ---
gnn:
  layers_pre_mp: 1                  
  layers_mp: 3                      
  layers_post_mp: 2                 
  dim_inner: 128                    
  layer_type: gatv2conv             # gatv2conv/gineconv use edge features; gcnconv/ginconv do not
  stage_type: skipsum               # (inert for expression_classifier) residual connections in stock GNN
  act: gelu
  dropout: 0.2
  att_heads: 4                      # GATv2 attention heads (held constant across the ablation arms)
  # --- expression_classifier pooling/skip ablation axes (see grid.yaml) ---
  variant: legacy                   # legacy | standard | pooling | pooling_skip
  pool_type: topk                   # topk | diffpool (only used by pooling* variants)
  aux_loss_weight: 1.0              # weight of the DiffPool link+entropy auxiliary loss

# --- Optimizations ---
optim:
  optimizer: adam
  base_lr: 0.0001
  weight_decay: 0.0005
  scheduler: cosine_with_warmup
