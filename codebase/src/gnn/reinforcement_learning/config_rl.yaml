# config_rl.yaml
# Central overview of all CLI settings for the GNN reinforcement-learning pipeline.
# Values here are defaults; command-line flags override them at runtime.

# Dataset / graph experiment
# CLI: --experiment, --mode, --edge-direction, --add-kappa, --add-virtual-supernode, --feature-groups, --positional-encoding
experiment:
  name: nur_f  # nur_f | f_fp_roh | kein_inv
  mode: tree_derivatives  # tree | tree_derivatives
  add_kappa: false  # merge kappa (h-function) subgraphs from datasets/kappas/ (CLI: --add-kappa)
  add_virtual_supernode: false  # add a fully-connected virtual supernode (CLI: --add-virtual-supernode)

  # Feature classes: node | topology | positional | edge
  # Each category: true -> all members | false -> none | [a, b] -> only these
  features:
    node: true
    topology: true
    # Anchor positional encoding (1/(1+hops) to nearest operator anchor per semantic
    # group). Members: anchor_additive, anchor_scaling, anchor_periodic,
    # anchor_exponential, anchor_transcendental. true = all groups, false = none.
    # NOTE: incompatible with add_virtual_supernode (the supernode collapses distances).
    positional: true
    edge: true

  # Optional explicit override (disables grouped toggles above when non-empty)
  active_features: ""

# Reward: potential-based shaping (PBRS) -- see reward.py and
# supervised_learning/handover_20260627_120213/reward-redesign-plan.md.
#   Phi(s) = -log10(clip(lastStepError, tolerance, error_ref) / tolerance)
#   r_total = lambda_s*(gamma*Phi(s')*(1-is_last) - Phi(s)) - w_time*dAbsTime/timeBudget
#             (+ record bonus + budget hinge on the last step)
# Weights lambda_s/w_time/w_record/w_over are Optuna-searched (ppo_optuna_search.py).
# The PBRS gamma is tied to the PPO discount (ppo.gamma); error_ref is a fixed
# structural constant (default 1.0 in RewardCalculator / RewardShapingParameters).

# Optuna hyperparameter search (main.py)
optuna:
  timesteps: 10000
  n_trials: 50
  n_envs: 1
  continue_study: false

# Gateway / Mathematica roundtrip timeouts
gateway:
  timeout_fallback: 5.0
  timeout_cushion: 1.0
  timeout_window: 100

# Full training with best trial (train_best.py)
train_best:
  timesteps: 250000
  n_envs: 1
  save_dir: models
  model_name: gnn_ppo_best
  no_torch_compile: false
  timeout_fallback: 5.0
  timeout_cushion: 2.0
  timeout_window: 100
