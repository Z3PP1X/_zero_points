# config_rl.yaml
# Central overview of all CLI settings for the GNN reinforcement-learning pipeline.
# Values here are defaults; command-line flags override them at runtime.

# Dataset / graph structure
# The dataset paths, graph mode, active feature set, kappa and virtual-supernode
# flags all come from a supervised-learning stage config — a single source of truth
# shared with the supervised pipeline (supervised_learning/config_settings/<stage>/
# base_config.yaml, its `data:` + `expression_graph:` blocks). RL ignores the SL
# train/model/gnn keys (its architecture is Optuna-searched).
#
# Override on the CLI with: --stage, --mode, --add-kappa, --add-virtual-supernode,
#   --feature-groups, --positional-encoding, --active-features
# stage4_experiment = all 32 features, kappa off, supernode off (kappa-free full graph).
# stage3_full_graph is the same but enables add_kappa → needs kappa data; opt in explicitly.
stage: stage4_experiment  # 1|2|3|4 or folder name (stage1_pure_ast … stage4_experiment)

# Reward: potential-based shaping (PBRS) -- see reward.py and
# supervised_learning/handover_20260627_120213/reward-redesign-plan.md.
#   Phi(s) = -log10(clip(lastStepError, tolerance, error_ref) / tolerance)
#   r_total = lambda_s*(gamma*Phi(s')*(1-is_last) - Phi(s)) - w_time*dAbsTime/timeBudget
#             (+ record bonus + budget hinge on the last step)
# Weights lambda_s/w_time/w_record/w_over are Optuna-searched (ppo_optuna_search.py).
# The PBRS gamma is tied to the PPO discount (ppo.gamma); error_ref is a fixed
# structural constant (default 1.0 in RewardCalculator / RewardShapingParameters).

# Optuna hyperparameter search (main.py)
optuna:
  timesteps: 10000
  n_trials: 50
  n_envs: 1
  continue_study: false

# Gateway / Mathematica roundtrip timeouts
gateway:
  timeout_fallback: 5.0
  timeout_cushion: 1.0
  timeout_window: 100

# Full training with best trial (train_best.py)
train_best:
  timesteps: 250000
  n_envs: 1
  save_dir: models
  model_name: gnn_ppo_best
  no_torch_compile: false
  timeout_fallback: 5.0
  timeout_cushion: 2.0
  timeout_window: 100
