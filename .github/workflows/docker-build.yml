name: Build and Push Solver Image

on:
  push:
    branches: [ "main" ]
  
jobs: 
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps: 
      - name: Code checkout
        uses: actions/checkout@v4
      
      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image and Upload
        uses: docker/build-push-action@v5
        with: 
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/runpod-workspace:latest